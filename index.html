<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Larp Forum - Discussion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo">LARP FORUM</div>
        </header>

        <div id="forum-posts" class="post-list">
            </div>

        <form id="post-form" class="editor-box">
            <input type="text" id="username" placeholder="Username" required>
            <textarea id="message" placeholder="Post your reply..." required></textarea>
            <button type="submit">Post Reply</button>
        </form>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
