<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="content">
            <div class="category-header">Looksmax</div>
            <table class="forum-table">
                <tr>
                    <th>Forum</th>
                    <th>Threads</th>
                    <th>Posts</th>
                </tr>
                <tr>
                    <td><div class="forum-title">Looksmaxing</div><p>Discuss fitness, style, surgery.</p></td>
                    <td>259K</td>
                    <td>4.2M</td>
                </tr>
            </table>

            <div class="create-thread-box">
                <h3>Create New Thread</h3>
                <input type="text" placeholder="Thread Title...">
                <textarea placeholder="Write your content here..."></textarea>
                <button>Post Thread</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="stat-box"><h3>Statistics</h3><p>Threads: 2M<br>Posts: 28M</p></div>
        </div>
    </div>
</body>
</html>
